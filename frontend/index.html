<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0F1417">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Orchestrator">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<title>Orchestrator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0F1417; --panel: #171E22; --panel-2: #1D262B; --border: #263136;
    --text: #E8E6E1; --text-dim: #8A9599; --amber: #E8A33D; --teal: #4FB0A5;
    --user-bubble: #223038; --danger: #D9645E;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:'Vazirmatn', sans-serif;
    display:flex; flex-direction:column;
    height:100dvh; overflow:hidden;
  }
  .mono{ font-family:'JetBrains Mono', monospace; }

  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:calc(14px + env(safe-area-inset-top)) 16px 10px 16px;
    border-bottom:1px solid var(--border); background:var(--panel);
  }
  .brand{ display:flex; align-items:center; gap:9px; }
  .brand .dot{ width:8px; height:8px; border-radius:50%; background:var(--amber); box-shadow:0 0 8px var(--amber); }
  .brand-text{ display:flex; flex-direction:column; line-height:1.15; }
  .brand-text .title{ font-weight:700; font-size:15px; }
  .brand-text .sub{ font-size:11px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; }

  /* Tabs */
  .tabs{ display:flex; border-bottom:1px solid var(--border); background:var(--panel); }
  .tab{
    flex:1; text-align:center; padding:11px 0; font-size:13.5px; color:var(--text-dim);
    border:none; background:none; font-family:'Vazirmatn',sans-serif; position:relative;
  }
  .tab.active{ color:var(--amber); font-weight:600; }
  .tab.active::after{ content:''; position:absolute; bottom:-1px; left:30%; right:30%; height:2px; background:var(--amber); border-radius:2px; }

  .view{ flex:1; overflow-y:auto; display:none; -webkit-overflow-scrolling:touch; }
  .view.active{ display:flex; flex-direction:column; }

  /* Chat view */
  #log{ flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:14px; }
  .row{ display:flex; flex-direction:column; max-width:86%; }
  .row.user{ align-self:flex-end; align-items:flex-end; }
  .row.assistant{ align-self:flex-start; align-items:flex-start; }
  .bubble{
    padding:11px 14px; border-radius:14px; font-size:14.5px; line-height:1.65;
    white-space:pre-wrap; word-break:break-word;
  }
  .row.user .bubble{ background:var(--user-bubble); border-bottom-left-radius:4px; }
  .row.assistant .bubble{ background:var(--panel-2); border:1px solid var(--border); border-bottom-right-radius:4px; }
  .bubble.error{ border-color:var(--danger); color:#FFD3D0; }
  .thinking{ display:flex; gap:5px; padding:12px 14px; }
  .thinking span{ width:6px; height:6px; border-radius:50%; background:var(--amber); animation:pulse 1.1s infinite ease-in-out; }
  .thinking span:nth-child(2){ animation-delay:.15s; }
  .thinking span:nth-child(3){ animation-delay:.3s; }
  @keyframes pulse{ 0%,80%,100%{opacity:.25; transform:scale(.8);} 40%{opacity:1; transform:scale(1);} }

  #composer{
    display:flex; align-items:flex-end; gap:8px; padding:10px 12px calc(12px + env(safe-area-inset-bottom)) 12px;
    border-top:1px solid var(--border); background:var(--panel);
  }
  #input{
    flex:1; resize:none; max-height:120px; min-height:42px;
    background:var(--panel-2); border:1px solid var(--border); color:var(--text);
    border-radius:12px; padding:11px 14px; font-family:'Vazirmatn',sans-serif; font-size:15px; outline:none;
  }
  #input:focus{ border-color:var(--amber); }
  #send{
    width:42px; height:42px; border-radius:12px; border:none; background:var(--amber);
    color:#1a1206; font-weight:700; font-size:16px; flex-shrink:0;
  }
  #send:disabled{ opacity:.4; }

  /* Agents dashboard view */
  #agents-view{ padding:16px; gap:12px; overflow-y:auto; }
  .section-title{ font-size:14px; font-weight:600; margin:6px 0 2px 0; display:flex; justify-content:space-between; align-items:center; }
  .btn{
    border:none; border-radius:10px; padding:10px 14px; font-family:'Vazirmatn',sans-serif;
    font-size:13.5px; font-weight:600;
  }
  .btn-primary{ background:var(--amber); color:#1a1206; }
  .btn-ghost{ background:var(--panel-2); color:var(--text); border:1px solid var(--border); }
  .btn-danger{ background:rgba(217,100,94,.15); color:var(--danger); border:1px solid rgba(217,100,94,.4); }
  .btn-sm{ padding:6px 10px; font-size:12px; }

  .agent-card{
    background:var(--panel-2); border:1px solid var(--border); border-radius:12px;
    padding:12px 14px; margin-bottom:10px;
  }
  .agent-card .name{ font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--teal); }
  .agent-card .badge{
    font-size:10px; color:var(--text-dim); border:1px solid var(--border); border-radius:6px;
    padding:1px 6px; margin-right:6px;
  }
  .agent-card .desc{ font-size:13px; color:var(--text-dim); margin:6px 0 10px 0; line-height:1.5; }
  .agent-card .actions{ display:flex; gap:8px; }

  .form-box{
    background:var(--panel-2); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:14px;
  }
  .form-box label{ font-size:12px; color:var(--text-dim); display:block; margin:10px 0 5px 0; }
  .form-box label:first-child{ margin-top:0; }
  .form-box input, .form-box textarea{
    width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text);
    border-radius:8px; padding:9px 11px; font-family:'Vazirmatn',sans-serif; font-size:14px; outline:none;
  }
  .form-box input:focus, .form-box textarea:focus{ border-color:var(--amber); }
  .form-box textarea{ resize:vertical; min-height:80px; line-height:1.5; }
  .form-actions{ display:flex; gap:8px; margin-top:12px; }

  .health-pill{
    display:inline-flex; align-items:center; gap:6px; font-size:11px; font-family:'JetBrains Mono',monospace;
    background:var(--panel-2); border:1px solid var(--border); border-radius:8px; padding:5px 9px; margin-bottom:12px;
  }
  .health-dot{ width:7px; height:7px; border-radius:50%; }
  .health-dot.ok{ background:#4FB06B; }
  .health-dot.bad{ background:var(--danger); }
  .hidden{ display:none !important; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="dot"></div>
    <div class="brand-text">
      <div class="title">Orchestrator</div>
      <div class="sub" id="session-label">session • local</div>
    </div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" data-tab="chat">چت</button>
  <button class="tab" data-tab="agents">ایجنت‌ها</button>
</div>

<div id="chat-view" class="view active">
  <div id="log"></div>
  <div id="composer">
    <textarea id="input" rows="1" placeholder="هر کاری داری بگو..."></textarea>
    <button id="send" onclick="send()">➤</button>
  </div>
</div>

<div id="agents-view" class="view">
  <div id="health-pill" class="health-pill">
    <div class="health-dot" id="health-dot"></div>
    <span id="health-text">در حال بررسی اتصال...</span>
  </div>

  <div class="section-title">
    <span>ساخت ایجنت جدید</span>
  </div>
  <div class="form-box">
    <label>نام (انگلیسی، بدون فاصله)</label>
    <input id="new-name" placeholder="مثلاً trader_agent" dir="ltr">
    <label>توضیح یک‌خطی (کِی صدا زده بشه)</label>
    <input id="new-desc" placeholder="مثلاً تحلیل تکنیکال طلا با SMC">
    <label>دستورالعمل کامل (System Prompt)</label>
    <textarea id="new-prompt" placeholder="تو یک تحلیل‌گر تکنیکال طلا هستی..."></textarea>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="createAgent()">ساخت ایجنت</button>
      <span id="create-status" style="font-size:12px; color:var(--text-dim); align-self:center;"></span>
    </div>
  </div>

  <div class="section-title">
    <span>ایجنت‌های فعال</span>
    <button class="btn btn-ghost btn-sm" onclick="loadAgents()">↻ به‌روزرسانی</button>
  </div>
  <div id="agents-list"></div>
</div>

<script>
const API_BASE = '';
let sessionId = localStorage.getItem('session_id') || null;
const log = document.getElementById('log');
const input = document.getElementById('input');

/* ---------- Tabs ---------- */
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab + '-view').classList.add('active');
    if(tab.dataset.tab === 'agents'){ loadAgents(); checkHealth(); }
  });
});

/* ---------- Chat ---------- */
function scrollBottom(){ log.scrollTop = log.scrollHeight; }

function addRow(role, text, isError){
  const row = document.createElement('div');
  row.className = 'row ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'bubble' + (isError ? ' error' : '');
  bubble.textContent = text;
  row.appendChild(bubble);
  log.appendChild(row);
  scrollBottom();
}

function addThinking(){
  const row = document.createElement('div');
  row.className = 'row assistant';
  row.id = 'thinking-row';
  const bubble = document.createElement('div');
  bubble.className = 'bubble thinking';
  bubble.innerHTML = '<span></span><span></span><span></span>';
  row.appendChild(bubble);
  log.appendChild(row);
  scrollBottom();
}
function removeThinking(){
  const el = document.getElementById('thinking-row');
  if(el) el.remove();
}

async function send(){
  const text = input.value.trim();
  if(!text) return;
  addRow('user', text);
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send').disabled = true;
  addThinking();

  try{
    const res = await fetch(API_BASE + '/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({session_id: sessionId, message: text})
    });
    const data = await res.json();
    sessionId = data.session_id;
    localStorage.setItem('session_id', sessionId);
    document.getElementById('session-label').textContent = 'session • ' + sessionId.slice(0,8);
    removeThinking();
    addRow('assistant', data.reply, !!data.error);
  }catch(e){
    removeThinking();
    addRow('assistant', 'خطای شبکه: ' + e.message, true);
  }
  document.getElementById('send').disabled = false;
}

input.addEventListener('keydown', (e)=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); }
});
input.addEventListener('input', ()=>{
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

if(sessionId){ document.getElementById('session-label').textContent = 'session • ' + sessionId.slice(0,8); }
addRow('assistant', 'سلام! بگو چه کاری می‌خوای انجام بدم، یا برو تب «ایجنت‌ها» تا مستقیم ایجنت بسازی.');

if('serviceWorker' in navigator){ navigator.serviceWorker.register('/sw.js').catch(()=>{}); }

/* ---------- Health check ---------- */
async function checkHealth(){
  const dot = document.getElementById('health-dot');
  const txt = document.getElementById('health-text');
  try{
    const res = await fetch(API_BASE + '/api/health');
    const data = await res.json();
    if(data.groq_key_set){
      dot.className = 'health-dot ok';
      txt.textContent = `متصل • ${data.agents_count} ایجنت فعال`;
    }else{
      dot.className = 'health-dot bad';
      txt.textContent = 'GROQ_API_KEY تنظیم نشده در Render';
    }
  }catch(e){
    dot.className = 'health-dot bad';
    txt.textContent = 'اتصال به سرور برقرار نشد';
  }
}

/* ---------- Agents dashboard ---------- */
async function loadAgents(){
  const list = document.getElementById('agents-list');
  list.innerHTML = '<div style="color:var(--text-dim); font-size:13px;">در حال بارگذاری...</div>';
  try{
    const res = await fetch(API_BASE + '/api/agents');
    const agents = await res.json();
    list.innerHTML = '';
    agents.forEach(a=>{
      const card = document.createElement('div');
      card.className = 'agent-card';
      card.innerHTML = `
        <div class="name mono">${a.name} ${a.is_builtin ? '<span class="badge">پایه</span>' : ''}</div>
        <div class="desc">${a.description}</div>
        <div class="actions">
          <button class="btn btn-ghost btn-sm" onclick='viewPrompt(${JSON.stringify(a.name)})'>مشاهده Prompt</button>
          ${!a.is_builtin ? `<button class="btn btn-danger btn-sm" onclick='deleteAgent(${JSON.stringify(a.name)})'>حذف</button>` : ''}
        </div>
      `;
      list.appendChild(card);
    });
  }catch(e){
    list.innerHTML = '<div style="color:var(--danger); font-size:13px;">خطا در دریافت لیست ایجنت‌ها</div>';
  }
}

function viewPrompt(name){
  fetch(API_BASE + '/api/agents').then(r=>r.json()).then(agents=>{
    const a = agents.find(x=>x.name===name);
    if(a) alert(a.system_prompt);
  });
}

async function deleteAgent(name){
  if(!confirm(`ایجنت "${name}" حذف بشه؟`)) return;
  try{
    const res = await fetch(API_BASE + '/api/agents/' + encodeURIComponent(name), { method:'DELETE' });
    const data = await res.json();
    if(data.ok) loadAgents();
    else alert('حذف نشد: ' + (data.error || 'نامشخص'));
  }catch(e){ alert('خطا: ' + e.message); }
}

async function createAgent(){
  const name = document.getElementById('new-name').value.trim();
  const description = document.getElementById('new-desc').value.trim();
  const system_prompt = document.getElementById('new-prompt').value.trim();
  const status = document.getElementById('create-status');

  if(!name || !description || !system_prompt){
    status.textContent = 'همه فیلدها لازمند';
    status.style.color = 'var(--danger)';
    return;
  }
  status.textContent = 'در حال ساخت...';
  status.style.color = 'var(--text-dim)';

  try{
    const res = await fetch(API_BASE + '/api/agents', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name, description, system_prompt})
    });
    const data = await res.json();
    if(data.ok){
      status.textContent = '✓ ساخته شد';
      status.style.color = '#4FB06B';
      document.getElementById('new-name').value = '';
      document.getElementById('new-desc').value = '';
      document.getElementById('new-prompt').value = '';
      loadAgents();
    }else{
      status.textContent = 'خطا: ' + (data.error || 'نامشخص');
      status.style.color = 'var(--danger)';
    }
  }catch(e){
    status.textContent = 'خطای شبکه: ' + e.message;
    status.style.color = 'var(--danger)';
  }
}
</script>
</body>
</html>

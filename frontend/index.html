<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0F1417">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Orchestrator">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<title>Orchestrator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0F1417;
    --panel: #171E22;
    --panel-2: #1D262B;
    --border: #263136;
    --text: #E8E6E1;
    --text-dim: #8A9599;
    --amber: #E8A33D;
    --teal: #4FB0A5;
    --user-bubble: #223038;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:'Vazirmatn', sans-serif;
    display:flex; flex-direction:column;
    height:100dvh; overflow:hidden;
  }
  .mono{ font-family:'JetBrains Mono', monospace; }

  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px calc(10px + env(safe-area-inset-top)) 16px;
    padding-top:calc(14px + env(safe-area-inset-top));
    border-bottom:1px solid var(--border);
    background:var(--panel);
  }
  .brand{ display:flex; align-items:center; gap:9px; }
  .brand .dot{ width:8px; height:8px; border-radius:50%; background:var(--amber); box-shadow:0 0 8px var(--amber); }
  .brand-text{ display:flex; flex-direction:column; line-height:1.15; }
  .brand-text .title{ font-weight:700; font-size:15px; }
  .brand-text .sub{ font-size:11px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; letter-spacing:.3px; }
  .agents-btn{
    background:var(--panel-2); border:1px solid var(--border); color:var(--text-dim);
    font-family:'JetBrains Mono',monospace; font-size:11px; padding:7px 10px; border-radius:8px;
  }

  #log{
    flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:14px;
    -webkit-overflow-scrolling:touch;
  }
  .row{ display:flex; flex-direction:column; max-width:86%; }
  .row.user{ align-self:flex-end; align-items:flex-end; }
  .row.assistant{ align-self:flex-start; align-items:flex-start; }

  .route-tag{
    font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--teal);
    margin-bottom:5px; opacity:.85; letter-spacing:.2px;
  }
  .route-tag::before{ content:"→ "; color:var(--text-dim); }

  .bubble{
    padding:11px 14px; border-radius:14px; font-size:14.5px; line-height:1.65;
    white-space:pre-wrap; word-break:break-word;
  }
  .row.user .bubble{ background:var(--user-bubble); border-bottom-left-radius:4px; }
  .row.assistant .bubble{ background:var(--panel-2); border:1px solid var(--border); border-bottom-right-radius:4px; }

  .thinking{ display:flex; gap:5px; padding:12px 14px; }
  .thinking span{ width:6px; height:6px; border-radius:50%; background:var(--amber); animation:pulse 1.1s infinite ease-in-out; }
  .thinking span:nth-child(2){ animation-delay:.15s; }
  .thinking span:nth-child(3){ animation-delay:.3s; }
  @keyframes pulse{ 0%,80%,100%{opacity:.25; transform:scale(.8);} 40%{opacity:1; transform:scale(1);} }

  #composer{
    display:flex; align-items:flex-end; gap:8px;
    padding:10px 12px calc(12px + env(safe-area-inset-bottom)) 12px;
    border-top:1px solid var(--border); background:var(--panel);
  }
  #input{
    flex:1; resize:none; max-height:120px; min-height:42px;
    background:var(--panel-2); border:1px solid var(--border); color:var(--text);
    border-radius:12px; padding:11px 14px; font-family:'Vazirmatn',sans-serif; font-size:15px;
    outline:none;
  }
  #input:focus{ border-color:var(--amber); }
  #send{
    width:42px; height:42px; border-radius:12px; border:none; background:var(--amber);
    color:#1a1206; font-weight:700; font-size:16px; flex-shrink:0;
  }
  #send:disabled{ opacity:.4; }

  #panel-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; z-index:10;
  }
  #panel{
    position:fixed; bottom:0; left:0; right:0; background:var(--panel);
    border-top:1px solid var(--border); border-radius:18px 18px 0 0;
    padding:18px 16px calc(20px + env(safe-area-inset-bottom)) 16px;
    max-height:70vh; overflow-y:auto; z-index:11;
    transform:translateY(100%); transition:transform .25s ease;
  }
  #panel.open{ transform:translateY(0); }
  #panel-overlay.open{ display:block; }
  #panel h3{ margin:0 0 12px 0; font-size:15px; }
  .agent-item{
    padding:11px 12px; background:var(--panel-2); border:1px solid var(--border);
    border-radius:10px; margin-bottom:8px;
  }
  .agent-item .name{ font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--teal); }
  .agent-item .desc{ font-size:13px; color:var(--text-dim); margin-top:3px; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="dot"></div>
    <div class="brand-text">
      <div class="title">Orchestrator</div>
      <div class="sub" id="session-label">session • local</div>
    </div>
  </div>
  <button class="agents-btn mono" onclick="openPanel()">AGENTS ▲</button>
</header>

<div id="log"></div>

<div id="composer">
  <textarea id="input" rows="1" placeholder="هر کاری داری بگو..."></textarea>
  <button id="send" onclick="send()">➤</button>
</div>

<div id="panel-overlay" onclick="closePanel()"></div>
<div id="panel">
  <h3>ایجنت‌های فعال سیستم</h3>
  <div id="agents-list"></div>
</div>

<script>
const API_BASE = '';
let sessionId = localStorage.getItem('session_id') || null;
const log = document.getElementById('log');
const input = document.getElementById('input');

function scrollBottom(){ log.scrollTop = log.scrollHeight; }

function addRow(role, text, routeTag){
  const row = document.createElement('div');
  row.className = 'row ' + role;
  if(routeTag){
    const tag = document.createElement('div');
    tag.className = 'route-tag mono';
    tag.textContent = routeTag;
    row.appendChild(tag);
  }
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  row.appendChild(bubble);
  log.appendChild(row);
  scrollBottom();
  return row;
}

function addThinking(){
  const row = document.createElement('div');
  row.className = 'row assistant';
  row.id = 'thinking-row';
  const bubble = document.createElement('div');
  bubble.className = 'bubble thinking';
  bubble.innerHTML = '<span></span><span></span><span></span>';
  row.appendChild(bubble);
  log.appendChild(row);
  scrollBottom();
}
function removeThinking(){
  const el = document.getElementById('thinking-row');
  if(el) el.remove();
}

async function send(){
  const text = input.value.trim();
  if(!text) return;
  addRow('user', text);
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send').disabled = true;
  addThinking();

  try{
    const res = await fetch(API_BASE + '/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({session_id: sessionId, message: text})
    });
    const data = await res.json();
    sessionId = data.session_id;
    localStorage.setItem('session_id', sessionId);
    document.getElementById('session-label').textContent = 'session • ' + sessionId.slice(0,8);
    removeThinking();
    addRow('assistant', data.reply);
  }catch(e){
    removeThinking();
    addRow('assistant', 'خطا در اتصال به سرور. مطمئن شو بکاند روشن است.');
  }
  document.getElementById('send').disabled = false;
}

input.addEventListener('keydown', (e)=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); }
});
input.addEventListener('input', ()=>{
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

async function openPanel(){
  document.getElementById('panel').classList.add('open');
  document.getElementById('panel-overlay').classList.add('open');
  try{
    const res = await fetch(API_BASE + '/api/agents');
    const agents = await res.json();
    const list = document.getElementById('agents-list');
    list.innerHTML = '';
    agents.forEach(a=>{
      const item = document.createElement('div');
      item.className = 'agent-item';
      item.innerHTML = `<div class="name mono">${a.name}</div><div class="desc">${a.description}</div>`;
      list.appendChild(item);
    });
  }catch(e){}
}
function closePanel(){
  document.getElementById('panel').classList.remove('open');
  document.getElementById('panel-overlay').classList.remove('open');
}

if(sessionId){ document.getElementById('session-label').textContent = 'session • ' + sessionId.slice(0,8); }
addRow('assistant', 'سلام! بگو چه کاری می‌خوای انجام بدم، یا بگو «یه ایجنت بساز برای...» تا به سیستم اضافه‌اش کنم.');

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}
</script>
</body>
</html>

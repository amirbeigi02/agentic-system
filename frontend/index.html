<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0B0F12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Orchestrator">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<title>Orchestrator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0B0F12;
    --bg-grad: radial-gradient(120% 90% at 50% -10%, #14201F 0%, #0B0F12 55%);
    --panel: #12181C;
    --panel-2: #182024;
    --panel-3: #1D262B;
    --border: #232D32;
    --border-soft: #1A2226;
    --text: #ECEAE4;
    --text-dim: #8A9599;
    --text-faint: #5C6669;
    --amber: #E8A33D;
    --amber-soft: rgba(232,163,61,.14);
    --teal: #4FB0A5;
    --teal-soft: rgba(79,176,165,.14);
    --danger: #E0645C;
    --danger-soft: rgba(224,100,92,.12);
    --success: #4FB06B;
    --user-bubble: linear-gradient(155deg,#243138,#1B262C);
    --radius-lg: 18px;
    --radius-md: 13px;
    --radius-sm: 9px;
    --shadow-card: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px -12px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg-grad), var(--bg); color:var(--text);
    font-family:'Vazirmatn', sans-serif;
    display:flex; flex-direction:column;
    height:100dvh; overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  .mono{ font-family:'JetBrains Mono', monospace; }
  svg{ display:block; flex-shrink:0; }

  /* ---------- Header ---------- */
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:calc(15px + env(safe-area-inset-top)) 18px 13px 18px;
    border-bottom:1px solid var(--border-soft);
    background:rgba(18,24,28,.85); backdrop-filter:blur(10px);
    position:relative; z-index:5;
  }
  .brand{ display:flex; align-items:center; gap:11px; }
  .brand-icon{
    width:34px; height:34px; border-radius:10px;
    background:linear-gradient(155deg,#2A3238,#171E22);
    border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
  }
  .brand-text .title{ font-weight:700; font-size:15.5px; letter-spacing:-.01em; }
  .brand-text .sub{ font-size:10.5px; color:var(--text-faint); font-family:'JetBrains Mono',monospace; margin-top:1px; }

  .status-chip{
    display:flex; align-items:center; gap:6px; padding:6px 11px;
    background:var(--panel-2); border:1px solid var(--border); border-radius:20px;
    font-size:11px; font-family:'JetBrains Mono',monospace; color:var(--text-dim);
  }
  .status-dot{ width:6px; height:6px; border-radius:50%; background:var(--text-faint); flex-shrink:0; }
  .status-dot.ok{ background:var(--success); box-shadow:0 0 6px var(--success); }
  .status-dot.bad{ background:var(--danger); box-shadow:0 0 6px var(--danger); }
  .status-dot.pending{ background:var(--amber); animation:blink 1.4s infinite; }
  @keyframes blink{ 50%{opacity:.3;} }

  /* ---------- Tabs ---------- */
  .tabs{
    display:flex; gap:4px; padding:6px; margin:12px 16px 0 16px;
    background:var(--panel); border:1px solid var(--border-soft); border-radius:14px;
  }
  .tab{
    flex:1; display:flex; align-items:center; justify-content:center; gap:6px;
    padding:9px 0; font-size:13px; color:var(--text-dim); font-weight:600;
    border:none; background:none; border-radius:10px; font-family:'Vazirmatn',sans-serif;
    transition:background .18s, color .18s;
  }
  .tab.active{ color:#151b0c; background:var(--amber); box-shadow:0 4px 14px -4px rgba(232,163,61,.5); }
  .tab.active svg{ stroke:#151b0c; }
  .tab svg{ stroke:var(--text-dim); transition:stroke .18s; }

  .view{ flex:1; overflow-y:auto; display:none; -webkit-overflow-scrolling:touch; }
  .view.active{ display:flex; flex-direction:column; }

  /* ---------- Chat ---------- */
  #log{ flex:1; overflow-y:auto; padding:18px 16px; display:flex; flex-direction:column; gap:16px; }
  .row{ display:flex; gap:9px; max-width:88%; }
  .row.user{ align-self:flex-end; flex-direction:row-reverse; }
  .row.assistant{ align-self:flex-start; }
  .avatar{
    width:26px; height:26px; border-radius:8px; flex-shrink:0; margin-top:2px;
    display:flex; align-items:center; justify-content:center;
    background:var(--panel-3); border:1px solid var(--border);
  }
  .avatar.user{ background:var(--amber-soft); border-color:rgba(232,163,61,.3); }
  .bubble-col{ display:flex; flex-direction:column; gap:4px; min-width:0; }
  .bubble{
    padding:12px 15px; border-radius:var(--radius-md); font-size:14.5px; line-height:1.7;
    white-space:pre-wrap; word-break:break-word; box-shadow:var(--shadow-card);
  }
  .row.user .bubble{ background:var(--user-bubble); border:1px solid rgba(255,255,255,.04); border-top-left-radius:4px; }
  .row.assistant .bubble{ background:var(--panel-2); border:1px solid var(--border); border-top-right-radius:4px; }
  .bubble.error{ border-color:rgba(224,100,92,.5); background:var(--danger-soft); color:#FFD9D6; }

  .thinking{ display:flex; gap:5px; padding:14px 15px; }
  .thinking span{ width:6px; height:6px; border-radius:50%; background:var(--amber); animation:pulse 1.1s infinite ease-in-out; }
  .thinking span:nth-child(2){ animation-delay:.15s; }
  .thinking span:nth-child(3){ animation-delay:.3s; }
  @keyframes pulse{ 0%,80%,100%{opacity:.25; transform:scale(.75);} 40%{opacity:1; transform:scale(1);} }

  #composer{
    display:flex; align-items:flex-end; gap:9px;
    padding:12px 14px calc(14px + env(safe-area-inset-bottom)) 14px;
    border-top:1px solid var(--border-soft); background:rgba(18,24,28,.9); backdrop-filter:blur(10px);
  }
  #input{
    flex:1; resize:none; max-height:120px; min-height:44px;
    background:var(--panel-2); border:1px solid var(--border); color:var(--text);
    border-radius:16px; padding:12px 16px; font-family:'Vazirmatn',sans-serif; font-size:15px; outline:none;
    transition:border-color .15s;
  }
  #input:focus{ border-color:var(--amber); }
  #send{
    width:44px; height:44px; border-radius:14px; border:none; background:var(--amber);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    box-shadow:0 4px 14px -4px rgba(232,163,61,.5); transition:transform .12s, opacity .12s;
  }
  #send:active{ transform:scale(.92); }
  #send:disabled{ opacity:.35; box-shadow:none; }
  #send svg{ stroke:#151b0c; }

  /* ---------- Dashboard ---------- */
  #agents-view{ padding:16px 16px 28px 16px; gap:0; overflow-y:auto; }

  .stat-row{ display:flex; gap:8px; margin-bottom:18px; }
  .stat-card{
    flex:1; background:var(--panel); border:1px solid var(--border-soft); border-radius:var(--radius-md);
    padding:12px 13px; box-shadow:var(--shadow-card);
  }
  .stat-card .label{ font-size:10.5px; color:var(--text-faint); font-family:'JetBrains Mono',monospace; margin-bottom:5px; }
  .stat-card .value{ font-size:15px; font-weight:700; display:flex; align-items:center; gap:6px; }
  .stat-card .value.ok{ color:var(--success); }
  .stat-card .value.bad{ color:var(--danger); }

  .section-title{
    font-size:13px; font-weight:700; color:var(--text-dim); text-transform:uppercase;
    letter-spacing:.04em; margin:22px 2px 10px 2px; display:flex; justify-content:space-between; align-items:center;
  }
  .section-title:first-of-type{ margin-top:0; }

  .icon-btn{
    display:flex; align-items:center; gap:5px; border:1px solid var(--border); background:var(--panel-2);
    color:var(--text-dim); border-radius:9px; padding:6px 10px; font-size:11.5px; font-weight:600;
    font-family:'Vazirmatn',sans-serif; transition:background .15s, color .15s, border-color .15s;
  }
  .icon-btn:active{ background:var(--panel-3); }
  .icon-btn svg{ width:14px; height:14px; stroke:var(--text-dim); }

  .card{
    background:var(--panel); border:1px solid var(--border-soft); border-radius:var(--radius-lg);
    box-shadow:var(--shadow-card); padding:16px;
  }

  .agent-card{
    background:var(--panel); border:1px solid var(--border-soft); border-radius:var(--radius-md);
    padding:14px 15px; margin-bottom:10px; box-shadow:var(--shadow-card);
  }
  .agent-card-top{ display:flex; align-items:center; gap:10px; }
  .agent-avatar{
    width:34px; height:34px; border-radius:9px; background:var(--teal-soft); border:1px solid rgba(79,176,165,.3);
    display:flex; align-items:center; justify-content:center; color:var(--teal); font-weight:700; font-size:13px;
    font-family:'JetBrains Mono',monospace; flex-shrink:0;
  }
  .agent-meta{ min-width:0; flex:1; }
  .agent-name{ font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--text); display:flex; align-items:center; gap:6px; }
  .badge{
    font-size:9.5px; color:var(--amber); background:var(--amber-soft); border:1px solid rgba(232,163,61,.3);
    border-radius:5px; padding:1.5px 6px; font-family:'Vazirmatn',sans-serif; font-weight:600;
  }
  .agent-desc{ font-size:12.5px; color:var(--text-dim); margin-top:2px; line-height:1.5; }
  .agent-actions{ display:flex; gap:6px; margin-top:11px; }
  .btn-icon-sm{
    display:flex; align-items:center; justify-content:center; gap:5px; padding:7px 11px;
    border-radius:8px; font-size:12px; font-weight:600; border:1px solid var(--border);
    background:var(--panel-2); color:var(--text-dim); font-family:'Vazirmatn',sans-serif;
  }
  .btn-icon-sm svg{ width:13px; height:13px; }
  .btn-icon-sm.danger{ color:var(--danger); border-color:rgba(224,100,92,.35); background:var(--danger-soft); }

  .form-box{
    background:var(--panel); border:1px solid var(--border-soft); border-radius:var(--radius-lg);
    padding:16px; margin-bottom:6px; box-shadow:var(--shadow-card);
  }
  .form-box label{ font-size:11.5px; color:var(--text-faint); display:block; margin:13px 0 6px 0; font-weight:600; }
  .form-box label:first-of-type{ margin-top:0; }
  .form-box input, .form-box textarea, .form-box select{
    width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text);
    border-radius:10px; padding:11px 13px; font-family:'Vazirmatn',sans-serif; font-size:14px; outline:none;
    transition:border-color .15s;
  }
  .form-box input:focus, .form-box textarea:focus, .form-box select:focus{ border-color:var(--amber); }
  .form-box textarea{ resize:vertical; min-height:88px; line-height:1.6; }
  .form-actions{ display:flex; align-items:center; gap:10px; margin-top:14px; }

  .btn-primary{
    border:none; border-radius:11px; padding:11px 18px; font-family:'Vazirmatn',sans-serif;
    font-size:13.5px; font-weight:700; background:var(--amber); color:#151b0c;
    box-shadow:0 4px 14px -5px rgba(232,163,61,.5); display:flex; align-items:center; gap:7px;
  }
  .btn-primary:active{ transform:scale(.97); }
  .status-text{ font-size:12px; color:var(--text-faint); }

  #test-result{
    margin-top:13px; white-space:pre-wrap; font-size:13px; line-height:1.65; display:none;
    background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:12px 14px;
    font-family:'JetBrains Mono',monospace; color:var(--text-dim);
  }
  #test-result.show{ display:block; }

  .empty-state{
    text-align:center; padding:30px 12px; color:var(--text-faint); font-size:12.5px;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M4.9 4.9l2.8 2.8M16.3 16.3l2.8 2.8M2 12h4M18 12h4M4.9 19.1l2.8-2.8M16.3 7.7l2.8-2.8"/></svg>
    </div>
    <div class="brand-text">
      <div class="title">Orchestrator</div>
      <div class="sub" id="session-label">session · local</div>
    </div>
  </div>
  <div class="status-chip">
    <div class="status-dot pending" id="header-dot"></div>
    <span id="header-status">در حال بررسی</span>
  </div>
</header>

<div class="tabs">
  <button class="tab active" data-tab="chat">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
    چت
  </button>
  <button class="tab" data-tab="agents">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    داشبورد
  </button>
</div>

<div id="chat-view" class="view active">
  <div id="log"></div>
  <div id="composer">
    <textarea id="input" rows="1" placeholder="هر کاری داری بگو..."></textarea>
    <button id="send" onclick="send()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7z"/></svg>
    </button>
  </div>
</div>

<div id="agents-view" class="view">
  <div class="stat-row">
    <div class="stat-card">
      <div class="label">اتصال</div>
      <div class="value" id="stat-connection">—</div>
    </div>
    <div class="stat-card">
      <div class="label">ایجنت‌ها</div>
      <div class="value" id="stat-agents-count">—</div>
    </div>
    <div class="stat-card">
      <div class="label">مدل فعال</div>
      <div class="value mono" style="font-size:11.5px;">gpt-oss-20b</div>
    </div>
  </div>

  <div class="section-title">ساخت ایجنت جدید</div>
  <div class="form-box">
    <label>نام (انگلیسی، بدون فاصله)</label>
    <input id="new-name" placeholder="مثلاً trader_agent" dir="ltr">
    <label>توضیح یک‌خطی (کِی صدا زده بشه)</label>
    <input id="new-desc" placeholder="مثلاً تحلیل تکنیکال طلا با SMC">
    <label>دستورالعمل کامل (System Prompt)</label>
    <textarea id="new-prompt" placeholder="تو یک تحلیل‌گر تکنیکال طلا هستی..."></textarea>
    <div class="form-actions">
      <button class="btn-primary" onclick="createAgent()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        ساخت ایجنت
      </button>
      <span id="create-status" class="status-text"></span>
    </div>
  </div>

  <div class="section-title">
    <span>ایجنت‌های فعال</span>
    <button class="icon-btn" onclick="loadAgents()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.6-6.4M21 3v6h-6"/></svg>
      به‌روزرسانی
    </button>
  </div>
  <div id="agents-list"></div>

  <div class="section-title">تست مستقیم ایجنت</div>
  <div class="form-box">
    <label>انتخاب ایجنت</label>
    <select id="test-agent-select"></select>
    <label>پیام تست</label>
    <textarea id="test-message" placeholder="مثلاً: خودت رو معرفی کن"></textarea>
    <div class="form-actions">
      <button class="btn-primary" onclick="runDirectTest()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M6 4l14 8-14 8V4z"/></svg>
        اجرای تست
      </button>
      <span id="test-status" class="status-text"></span>
    </div>
    <div id="test-result"></div>
  </div>
</div>

<script>
const API_BASE = '';
let sessionId = localStorage.getItem('session_id') || null;
const log = document.getElementById('log');
const input = document.getElementById('input');

const botIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4M8 16h.01M16 16h.01"/></svg>`;
const userIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;

/* ---------- Tabs ---------- */
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab + '-view').classList.add('active');
    if(tab.dataset.tab === 'agents'){ loadAgents(); checkHealth(); }
  });
});

/* ---------- Chat ---------- */
function scrollBottom(){ log.scrollTop = log.scrollHeight; }

function addRow(role, text, isError){
  const row = document.createElement('div');
  row.className = 'row ' + role;
  const avatar = document.createElement('div');
  avatar.className = 'avatar' + (role === 'user' ? ' user' : '');
  avatar.innerHTML = role === 'user' ? userIcon : botIcon;
  const col = document.createElement('div');
  col.className = 'bubble-col';
  const bubble = document.createElement('div');
  bubble.className = 'bubble' + (isError ? ' error' : '');
  bubble.textContent = text;
  col.appendChild(bubble);
  row.appendChild(avatar);
  row.appendChild(col);
  log.appendChild(row);
  scrollBottom();
}

function addThinking(){
  const row = document.createElement('div');
  row.className = 'row assistant';
  row.id = 'thinking-row';
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.innerHTML = botIcon;
  const col = document.createElement('div');
  col.className = 'bubble-col';
  const bubble = document.createElement('div');
  bubble.className = 'bubble thinking';
  bubble.innerHTML = '<span></span><span></span><span></span>';
  col.appendChild(bubble);
  row.appendChild(avatar);
  row.appendChild(col);
  log.appendChild(row);
  scrollBottom();
}
function removeThinking(){
  const el = document.getElementById('thinking-row');
  if(el) el.remove();
}

async function send(){
  const text = input.value.trim();
  if(!text) return;
  addRow('user', text);
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send').disabled = true;
  addThinking();

  try{
    const res = await fetch(API_BASE + '/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({session_id: sessionId, message: text})
    });
    const data = await res.json();
    sessionId = data.session_id;
    localStorage.setItem('session_id', sessionId);
    document.getElementById('session-label').textContent = 'session · ' + sessionId.slice(0,8);
    removeThinking();
    addRow('assistant', data.reply, !!data.error);
  }catch(e){
    removeThinking();
    addRow('assistant', 'خطای شبکه: ' + e.message, true);
  }
  document.getElementById('send').disabled = false;
}

input.addEventListener('keydown', (e)=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); }
});
input.addEventListener('input', ()=>{
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

if(sessionId){ document.getElementById('session-label').textContent = 'session · ' + sessionId.slice(0,8); }
addRow('assistant', 'سلام! بگو چه کاری می‌خوای انجام بدم، یا برو تب «داشبورد» تا مستقیم ایجنت بسازی و تست کنی.');

if('serviceWorker' in navigator){ navigator.serviceWorker.register('/sw.js').catch(()=>{}); }

/* ---------- Health check ---------- */
async function checkHealth(){
  const headerDot = document.getElementById('header-dot');
  const headerStatus = document.getElementById('header-status');
  const statConn = document.getElementById('stat-connection');
  const statCount = document.getElementById('stat-agents-count');
  try{
    const res = await fetch(API_BASE + '/api/health');
    const data = await res.json();
    if(data.groq_key_set){
      headerDot.className = 'status-dot ok';
      headerStatus.textContent = 'متصل';
      statConn.innerHTML = '<span class="value ok">فعال</span>';
      statCount.textContent = data.agents_count;
    }else{
      headerDot.className = 'status-dot bad';
      headerStatus.textContent = 'کلید API نیست';
      statConn.innerHTML = '<span class="value bad">قطع</span>';
    }
  }catch(e){
    headerDot.className = 'status-dot bad';
    headerStatus.textContent = 'قطع';
    statConn.innerHTML = '<span class="value bad">خطا</span>';
  }
}
checkHealth();

/* ---------- Agents dashboard ---------- */
async function loadAgents(){
  const list = document.getElementById('agents-list');
  const select = document.getElementById('test-agent-select');
  list.innerHTML = '<div class="empty-state">در حال بارگذاری...</div>';
  try{
    const res = await fetch(API_BASE + '/api/agents');
    const agents = await res.json();
    list.innerHTML = '';
    select.innerHTML = agents.map(a => `<option value="${a.name}">${a.name}</option>`).join('');

    if(agents.length === 0){
      list.innerHTML = '<div class="empty-state">هنوز ایجنتی ساخته نشده</div>';
      return;
    }

    agents.forEach(a=>{
      const initials = a.name.slice(0,2).toUpperCase();
      const card = document.createElement('div');
      card.className = 'agent-card';
      card.innerHTML = `
        <div class="agent-card-top">
          <div class="agent-avatar">${initials}</div>
          <div class="agent-meta">
            <div class="agent-name">${a.name} ${a.is_builtin ? '<span class="badge">پایه</span>' : ''}</div>
            <div class="agent-desc">${a.description}</div>
          </div>
        </div>
        <div class="agent-actions">
          <button class="btn-icon-sm" onclick='viewPrompt(${JSON.stringify(a.name)})'>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
            Prompt
          </button>
          ${!a.is_builtin ? `<button class="btn-icon-sm danger" onclick='deleteAgent(${JSON.stringify(a.name)})'>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/></svg>
            حذف
          </button>` : ''}
        </div>
      `;
      list.appendChild(card);
    });
  }catch(e){
    list.innerHTML = '<div class="empty-state" style="color:var(--danger);">خطا در دریافت لیست ایجنت‌ها</div>';
  }
}

function viewPrompt(name){
  fetch(API_BASE + '/api/agents').then(r=>r.json()).then(agents=>{
    const a = agents.find(x=>x.name===name);
    if(a) alert(a.system_prompt);
  });
}

async function deleteAgent(name){
  if(!confirm(`ایجنت "${name}" حذف بشه؟`)) return;
  try{
    const res = await fetch(API_BASE + '/api/agents/' + encodeURIComponent(name), { method:'DELETE' });
    const data = await res.json();
    if(data.ok) loadAgents();
    else alert('حذف نشد: ' + (data.error || 'نامشخص'));
  }catch(e){ alert('خطا: ' + e.message); }
}

async function createAgent(){
  const name = document.getElementById('new-name').value.trim();
  const description = document.getElementById('new-desc').value.trim();
  const system_prompt = document.getElementById('new-prompt').value.trim();
  const status = document.getElementById('create-status');

  if(!name || !description || !system_prompt){
    status.textContent = 'همه فیلدها لازمند';
    status.style.color = 'var(--danger)';
    return;
  }
  status.textContent = 'در حال ساخت...';
  status.style.color = 'var(--text-faint)';

  try{
    const res = await fetch(API_BASE + '/api/agents', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name, description, system_prompt})
    });
    const data = await res.json();
    if(data.ok){
      status.textContent = '✓ ساخته شد';
      status.style.color = 'var(--success)';
      document.getElementById('new-name').value = '';
      document.getElementById('new-desc').value = '';
      document.getElementById('new-prompt').value = '';
      loadAgents();
    }else{
      status.textContent = 'خطا: ' + (data.error || 'نامشخص');
      status.style.color = 'var(--danger)';
    }
  }catch(e){
    status.textContent = 'خطای شبکه: ' + e.message;
    status.style.color = 'var(--danger)';
  }
}

async function runDirectTest(){
  const agent_name = document.getElementById('test-agent-select').value;
  const message = document.getElementById('test-message').value.trim();
  const status = document.getElementById('test-status');
  const resultBox = document.getElementById('test-result');

  if(!agent_name || !message){
    status.textContent = 'ایجنت و پیام لازمند';
    status.style.color = 'var(--danger)';
    return;
  }
  status.textContent = 'در حال اجرا...';
  status.style.color = 'var(--text-faint)';
  resultBox.classList.remove('show');

  try{
    const res = await fetch(API_BASE + '/api/test-agent', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({agent_name, message})
    });
    const data = await res.json();
    if(data.ok){
      status.textContent = '✓ اجرا شد';
      status.style.color = 'var(--success)';
      resultBox.textContent = data.result;
      resultBox.classList.add('show');
    }else{
      status.textContent = 'خطا';
      status.style.color = 'var(--danger)';
      resultBox.textContent = data.error;
      resultBox.classList.add('show');
    }
  }catch(e){
    status.textContent = 'خطای شبکه';
    status.style.color = 'var(--danger)';
    resultBox.textContent = e.message;
    resultBox.classList.add('show');
  }
}
</script>
